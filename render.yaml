databases:
  - name: zamance-db
    plan: free
    databaseName: zamance
    user: zamance

services:
  - type: web
    name: zamance-bot
    runtime: docker
    plan: free
    rootDir: bot
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zamance-db
          property: connectionString
      - key: RPC_URL
        value: https://ethereum-sepolia-rpc.publicnode.com
      - key: USDC_ADDRESS
        value: "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238"
      - key: WRAPPER_ADDRESS
        value: "0xBF525F705d2190BF4A58B82f07DD8676c65a9e9D"
      - key: DASHBOARD_ORIGIN
        value: https://delog-app.vercel.app
      - key: APPROVAL_POLL_INTERVAL_MS
        value: "30000"
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: SLACK_STATE_SECRET
        sync: false
      - key: SLACK_OIDC_REDIRECT_URI
        sync: false
      - key: BOT_SAFE_SIGNER_PRIVATE_KEY
        sync: false
      - key: SAFE_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
